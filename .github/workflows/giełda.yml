name: Globalny Asystent Gieldowy

# Definiujemy, kiedy skrypt ma się uruchamiać
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  uruchom-skrypt:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
          python-version: '3.11'


    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Uruchomienie monitoringu gieldy
      env:
        GOOGLE_SHEETS_CSV_URL: ${{ secrets.GOOGLE_SHEETS_CSV_URL }}
        FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
