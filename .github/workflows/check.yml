name: Sprawdz Raporty
on:
  schedule:
    - cron: '*/15 * * * *' # Co 15 minut
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Uprawnienia do zapisu history.txt
    steps:
      - uses: actions/checkout@v4 # Zaktualizowano z v3/v4 na v4 (najnowsza)
      - name: Setup Python
        uses: actions/setup-python@v5 # Zaktualizowano z v4 na v5 (najnowsza)
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python main.py
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add history.txt
          git commit -m "Update history" || exit 0
          git push
